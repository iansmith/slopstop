system = "github"
key    = "iansmith/slopstop"
prefix = "BILL"

# Project-local ticket tracking. The historical defaults live under ~/.claude, which is
# a protected path: a headless fleet agent's Write tool refuses it even when the launch
# passes a matching --add-dir. Relative paths resolve from the main worktree root, so
# every agent worktree shares these two dirs. `.slopstop/` is gitignored.
tracking_dir = ".slopstop/ticket-active"
archive_dir  = ".slopstop/ticket-archive"

# Four-tier model assignments (tier recalibration, umbrella #237).
# huge > large > medium > small; each stage descends one tier and the tier
# above checks its work.
[tiers]
# Table form (BILL-258 hard cutover): each tier is a [tiers.<tier>] sub-table with
# provider/model and an optional version pin. provider is carried for the router only —
# the skills never gate on it. model is the family the tier-gate matches; version, when
# present, is matched as a dotted prefix of the session model's version.
[tiers.huge]        # :design; huge-tier checks of large's work (ticket-tree
                    #   adversary, rewrite delta checks, final-report adversary)
provider = "anthropic"
model    = "opus"
version  = "4.8"

[tiers.large]       # :tickets + failure-driven rewrites; umbrella/integration drift checks
provider = "anthropic"
model    = "opus"
version  = "4.6"

[tiers.medium]      # :run orchestrator; per-ticket handoff reviewer/adversary subagents
provider = "anthropic"
model    = "sonnet"

[tiers.small]       # fleet implementation agents
provider = "anthropic"
model    = "haiku"

# Process structure: which TIER each stage/check runs at. Two-hop resolution
# stage -> tier -> model. Re-tiering a stage is a one-line edit here. Absent
# table/key -> the defaults (current ladder).
[stage_tiers]
design              = "huge"
tickets             = "large"
run                 = "medium"
ticket_adversary    = "huge"
rewrite_delta_check = "huge"
drift_check         = "large"
handoff_verifier    = "medium"
report_adversary    = "huge"

[status_labels]
in_progress = "status:in-progress"
# 3-state workflow: no in_review label.
# Add  in_review = "status:in-review"  here to upgrade to 4-state.

# PR review backend.
# Omit this block entirely to use CodeRabbit (default).
# Without CodeRabbit installed AND without backend = "claude", no review runs.
[pr_review]
backend = "claude"
effort  = "high"   # low | medium | high | max | ultra
fix     = false    # true: commit fixable findings after code-review completes

[workflow]
skip_confirm = true

# Fleet agents launched by :run are headless (`claude -p`) and cannot answer a
# prompt. Every key below defaults to "ask" independently, so each one in the
# :start -> :plan -> :pr chain an agent walks must be answered here or the agent
# stalls until monitoring kills it.
[autonomous]
enabled = true

branch_type          = "feat"          # matches this repo's feat/BILL-* branches
on_phase0_tests_pass = "abort"         # red tests passing on a greenfield Go binary
                                       # means the ticket is stale -> let :run diagnose
on_parallel_agents   = "serial"        # a fleet agent must not spawn its own worktree
                                       # agents; it owns exactly one leaf
on_test_gaps         = "add-all"
on_simplify_changes  = "accept"
on_test_failure      = "abort"         # never commit red
on_red_findings      = "fix-and-retry" # safe: [pr_review] fix = false
on_slop_findings     = "skip"          # forced: only "ask" | "skip", and "ask" stalls
                                       # headless. Slop gate is off for fleet agents;
                                       # :run Step 6 review is the backstop.
merge_strategy       = "merge"         # this repo merges, never squashes
merge_target_state   = "auto"
archive_immediately  = false           # :run Step 8 owns integration ordering

# Supervised meta-test posture (run router-phase1-20260709-1921 / ticket #181):
# observe file-map violations instead of instant-killing on them.
[fleet.monitoring]
filemap_violation = "warn"

# Phase-1 metering router enabled for this repo (umbrella #201, ticket #211).
# :design health-checks it at run start and :run points each fleet agent at it
# (ANTHROPIC_BASE_URL) with run/ticket tagging headers; a dead router never blocks
# a run — agents fall back to direct API access. See router/README.md.
[fleet.router]
enabled = true
host    = "127.0.0.1"
port    = 8484

