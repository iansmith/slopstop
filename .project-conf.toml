system = "github"
key    = "iansmith/slopstop"
prefix = "BILL"

[status_labels]
in_progress = "status:in-progress"
# 3-state workflow: no in_review label.
# Add  in_review = "status:in-review"  here to upgrade to 4-state.

# Code-graph indexing config (BILL-59).
# languages: which SCIP indexers apply to this repo.
# module_root: directory relative to repo root where the SCIP indexer is run.
#   Commit file paths (repo-root-relative) have this prefix stripped before
#   being matched against SCIP-indexed paths (which are module_root-relative).
[code-graph]
languages    = ["python"]
module_root  = "rag-service"
skip         = ["tests/"]

# PR review backend.
# Omit this block entirely to use CodeRabbit (default).
# Without CodeRabbit installed AND without backend = "claude", no review runs.
[pr_review]
backend = "claude"
effort  = "high"   # low | medium | high | max | ultra
fix     = false    # true: commit fixable findings after code-review completes
