# Anthropic API pricing table
# Rates are in USD per million tokens (MTok).
#
# RATE BASIS: LIST PRICE (Anthropic published per-token rates).
#   New-tokenizer models (Sonnet 5, Opus 4.8, Fable 5) tokenize ~1.3x more tokens
#   per unit of text than old-tokenizer models. The API reports native-tokenizer
#   counts in each response's `usage` block — those counts already carry the
#   tokenizer effect. These rates are the Anthropic list prices per token, so
#   multiplying rate × reported tokens gives invoice-accurate USD.
#
# Source: Anthropic pricing pages, read 2026-07-11.
#   Sonnet 5 is on introductory pricing through 2026-08-31 ($2/$10 instead of
#   $3/$15). Rates below are the CURRENT (intro) figures. Update after 2026-09-01.
#   cache_write/cache_read — DERIVED from Anthropic's standard prompt-caching ratios
#     (cache_write = 1.25 x input for the 5-minute TTL; cache_read = 0.10 x input).
#     These were not separately sourced from the pricing page; replace with published
#     per-model cache rates if they differ.
# Batch API rates (50% off listed) are not represented — the fleet does not use the
# Batch API, so metered traffic is always at standard rates.
#
# Tier labels below use the four-tier scheme (small/medium/large/huge):
#   haiku-4-5 = small · sonnet-5 = medium · opus-4-6/4-8 = large · fable-5 = huge.
# Set by the tier recalibration (umbrella #237); resolves the earlier
# "opus-4-8 and sonnet-5 both medium" question — opus-4-8 is now large.

[providers.anthropic]
url = "https://api.anthropic.com"
auth = "passthrough"

[models."claude-haiku-4-5"]
provider = "anthropic"
family = "haiku"
version = "4.5"
tier = "small"
# Haiku 4.5 — old tokenizer. Listed $1.00/$5.00.
input = 1.00
output = 5.00
cache_write = 1.25
cache_read = 0.10

[models."claude-haiku-4-5-20251001"]
provider = "anthropic"
family = "haiku"
version = "4.5-20251001"
tier = "small"
# Haiku 4.5's actual model ID is the dated snapshot, not the bare alias above —
# [tiers.small] in .project-conf.toml resolves to this string, and it was
# showing up unpriced ($0.00) in /spend before this entry existed. Same rates
# as the bare alias above.
input = 1.00
output = 5.00
cache_write = 1.25
cache_read = 0.10

[models."claude-sonnet-5"]
provider = "anthropic"
family = "sonnet"
version = "5"
tier = "medium"
# Sonnet 5 — intro pricing $2/$10 (through 2026-08-31; full price $3/$15).
input = 2.00
output = 10.00
cache_write = 2.50
cache_read = 0.20

[models."claude-opus-4-6"]
provider = "anthropic"
family = "opus"
version = "4.6"
tier = "large"
# Opus 4.6 — old tokenizer. Listed $5/$25.
input = 5.00
output = 25.00
cache_write = 6.25
cache_read = 0.50

[models."claude-opus-4-8"]
provider = "anthropic"
family = "opus"
version = "4.8"
tier = "large"
# Opus 4.8 — listed $5/$25.
input = 5.00
output = 25.00
cache_write = 6.25
cache_read = 0.50

[models."claude-fable-5"]
provider = "anthropic"
family = "fable"
version = "5"
tier = "huge"
# Fable 5 — listed $10/$50.
input = 10.00
output = 50.00
cache_write = 12.50
cache_read = 1.00
